<style>

/* 🌌 BACKGROUND */
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    color:white;
    background: linear-gradient(#001a2e,#000);
    overflow-x:hidden;
}

/* 🫧 FLOATING BUBBLES */
.bubble{
    position:absolute;
    bottom:-100px;
    width:40px;
    height:40px;
    background:radial-gradient(circle,#00eaff,#00ffaa);
    border-radius:50%;
    opacity:0.4;
    animation: rise 10s infinite ease-in;
}

@keyframes rise{
    0%{transform:translateY(0) scale(1);}
    100%{transform:translateY(-120vh) scale(1.5);}
}

/* HEADER */
header{
    background: linear-gradient(90deg,#00eaff,#00ffaa);
    color:black;
    padding:20px;
    text-align:center;
    box-shadow:0 0 25px #00eaff;
}

/* NAV */
nav{
    background:rgba(0,0,0,0.7);
    padding:10px;
    backdrop-filter:blur(10px);
}

nav a{
    color:#00eaff;
    margin:15px;
    text-decoration:none;
}

/* HERO SECTION */
.hero{
    height:60vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    background:url('https://images.unsplash.com/photo-1505685296765-3a2736de412f') center/cover;
    position:relative;
}

.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
}

.hero h1{
    position:relative;
    font-size:50px;
}

/* SECTION */
.section{
    padding:20px;
}

/* HORIZONTAL SCROLL */
.row{
    display:flex;
    overflow-x:auto;
    gap:15px;
    padding:10px;
}

/* CARD */
.card{
    min-width:200px;
    background:rgba(255,255,255,0.05);
    border:1px solid #00eaff;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}

.card:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #00eaff;
}

/* BUTTON */
button{
    width:100%;
    padding:8px;
    background:linear-gradient(#00eaff,#00ffaa);
    border:none;
    cursor:pointer;
}

/* FOOTER */
footer{
    background:#000;
    padding:20px;
    text-align:center;
}

</style>
</head>

<script>
for(let i=0;i<20;i++){

    b.style.animationDuration=(5+Math.random()*10)+"s";
    document.body.appendChild(b);
}
</script>
