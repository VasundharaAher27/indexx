<!DOCTYPE html>
<html>
<head>

<title>Entertainment Hub</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* 🔥 RESET */
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(180deg,#001a2e,#000);
    color:white;
    overflow-x:hidden;
}

/* 🫧 BUBBLE BACKGROUND (FIXED + BEHIND) */
.bubble-container{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:0;
    overflow:hidden;
}

.bubble{
    position:absolute;
    bottom:-100px;
    width:30px;
    height:30px;
    border-radius:50%;
    background:radial-gradient(circle,#00eaff,#00ffaa);
    opacity:0.25;
    animation:rise linear infinite;
}

@keyframes rise{
    from{transform:translateY(0);}
    to{transform:translateY(-120vh);}
}

/* CONTENT ABOVE */
.main{
    position:relative;
    z-index:2;
}

/* HEADER */
header{
    background:linear-gradient(90deg,#00eaff,#00ffaa);
    color:black;
    padding:15px;
    text-align:center;
    box-shadow:0 0 20px #00eaff;
}

/* NAV */
nav{
    display:flex;
    justify-content:center;
    gap:30px;
    padding:10px;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(10px);
}

nav a{
    color:#00eaff;
    text-decoration:none;
    transition:0.3s;
}
nav a:hover{
    color:#00ffaa;
    text-shadow:0 0 10px #00ffaa;
}

/* 🎬 HERO */
.hero{
    height:75vh;
    background:url('https://images.unsplash.com/photo-1524985069026-dd778a71c7b4') center/cover;
    display:flex;
    align-items:flex-end;
    padding:40px;
    position:relative;
}

.hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(to top,#000 10%,transparent);
}

.hero-content{
    position:relative;
    z-index:2;
}

.hero h1{
    font-size:50px;
}

.hero button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    background:linear-gradient(#00eaff,#00ffaa);
    border-radius:20px;
    cursor:pointer;
}

/* SECTION */
.section{
    padding:20px;
}

/* ROW */
.row{
    display:flex;
    gap:15px;
    overflow-x:auto;
    padding-top:10px;
}

/* CARD */
.card{
    min-width:180px;
    background:rgba(255,255,255,0.05);
    border:1px solid #00eaff;
    border-radius:10px;
    overflow:hidden;
    transition:0.3s;
}

.card img{
    width:100%;
    height:120px;
    object-fit:cover;
}

.card:hover{
    transform:scale(1.1);
    box-shadow:0 0 20px #00eaff;
}

/* FOOTER */
footer{
    text-align:center;
    padding:20px;
    background:#000;
    margin-top:20px;
}

</style>
</head>

<body>

<!-- 🫧 CLEAN BUBBLES -->
<div class="bubble-container"></div>

<div class="main">

<header>
<h1>⚡ Entertainment Hub</h1>
</header>

<nav>
<a href="#">Home</a>
<a href="#">Movies</a>
<a href="#">Music</a>
<a href="#">Games</a>
</nav>

<!-- HERO -->
<div class="hero">
<div class="hero-content">
<h1>Avengers</h1>
<p>Epic cinematic universe experience</p>
<button>Watch Now</button>
</div>
</div>

<!-- MOVIES -->
<div class="section">
<h2>Trending</h2>
<div class="row">

<div class="card"><img src="https://picsum.photos/200/120?1"></div>
<div class="card"><img src="https://picsum.photos/200/120?2"></div>
<div class="card"><img src="https://picsum.photos/200/120?3"></div>
<div class="card"><img src="https://picsum.photos/200/120?4"></div>

</div>
</div>

<!-- MORE ROWS -->
<div class="section">
<h2>Popular</h2>
<div class="row">
<div class="card"><img src="https://picsum.photos/200/120?5"></div>
<div class="card"><img src="https://picsum.photos/200/120?6"></div>
<div class="card"><img src="https://picsum.photos/200/120?7"></div>
</div>
</div>

<footer>
<p>© 2026 Entertainment Hub</p>
</footer>

</div>

<!-- 🫧 BUBBLE SCRIPT (CONTROLLED) -->
<script>
const container=document.querySelector(".bubble-container");

for(let i=0;i<25;i++){
    let b=document.createElement("div");
    b.className="bubble";
    b.style.left=Math.random()*100+"%";
    b.style.animationDuration=(8+Math.random()*10)+"s";
    b.style.width=b.style.height=(20+Math.random()*40)+"px";
    container.appendChild(b);
}
</script>

</body>
</html>
